# Build & push the OpenThoughts-agent custom iris task image to GHCR.
#
# The image (docker/Dockerfile.agent-task) adds gVisor (runsc) + Docker to the
# stock iris-task base so the agent can execute Terminal-Bench tool commands in
# an isolated sandbox. Select it on iris with
#   iris job run --task-image ghcr.io/<owner>/openthoughts-agent-task:latest
# (iris auto-rewrites ghcr.io -> the per-region Artifact Registry mirror).
name: build-openthoughts-agent-image

on:
  push:
    branches: ["**"]
    paths:
      - "openthoughts-agent/docker/Dockerfile.agent-task"
      - ".github/workflows/build-openthoughts-agent-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name (lowercased owner)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/openthoughts-agent-task" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: openthoughts-agent
          file: openthoughts-agent/docker/Dockerfile.agent-task
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.img.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ steps.img.outputs.name }}:buildcache,mode=max
